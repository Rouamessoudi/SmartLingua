# Config Server - Exactement comme le TP (Séance 6)
spring.application.name=config-server
# Si 8890 est occupé : tuer l’ancien Java/config-server ou changer ce port + URL dans courses / adaptive-learning
server.port=8890

# eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# config server - charger les fichiers de configuration localement
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config
# spring.cloud.config.server.git.uri=https://github.com/my/servercloudconfig.git
