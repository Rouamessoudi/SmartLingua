spring.application.name=adaptive-learning-test
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
eureka.client.enabled=false

spring.datasource.url=jdbc:h2:mem:adaptivetest;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/smartlingua

adaptive.scheduler.difficulty.enabled=false
adaptive.scheduler.recommendation.enabled=false
adaptive.security.relaxed-student-check=true
adaptive.ai.enabled=false
# JWT de test sans ligne app_user : résolution /api/adaptive/me/* via fallback
adaptive.me.dev-fallback-student-id=303

logging.level.org.springframework.security=WARN
