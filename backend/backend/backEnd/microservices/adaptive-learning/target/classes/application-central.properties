# Base centrale PostgreSQL (meme logique que les autres microservices)
spring.datasource.url=jdbc:postgresql://localhost:5432/smartlingua_db?currentSchema=adaptive_learning
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=adaptive_learning
