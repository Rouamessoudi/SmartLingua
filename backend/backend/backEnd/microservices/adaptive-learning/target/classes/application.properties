spring.application.name=adaptive-learning
server.port=8094

# N'exposer en HAL que les repos annotés @RepositoryRestResource (évite des conflits de mapping avec nos @RestController).
spring.data.rest.detection-strategy=annotated

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8890

# MySQL uniquement (XAMPP / meme base que users et courses)
spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080
management.endpoints.web.exposure.include=refresh,health
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/smartlingua

# Spring AI (OpenAI) — definir OPENAI_API_KEY=sk-... pour activer le LLM reel.
# Sans cle valide, l'app demarre quand meme ; les appels modele echouent et le code retombe sur l'heuristique.
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-dev-placeholder-replace-with-real-openai-key}
spring.ai.openai.chat.options.model=gpt-4o-mini

# Recommandations IA : false pour forcer uniquement le fallback métier (démo sans clé API).
adaptive.ai.enabled=true

# Démo locale : true = tout utilisateur avec rôle étudiant peut appeler n'importe quel studentId.
# Mettre false en production et mapper student_id dans le JWT.
adaptive.security.relaxed-student-check=true

# Schedulers métier (cron Spring : seconde minute heure jour mois jour-semaine)
# DifficultyMonitoringScheduler désactivé si simple-progress est activé (évite double analyse).
adaptive.scheduler.difficulty.enabled=false
adaptive.scheduler.difficulty.cron=0 */10 * * * *
adaptive.scheduler.recommendation.enabled=true
adaptive.scheduler.recommendation.cron=0 15 * * * *

# Analyse progression + alertes + échecs tests récents (remplace le job « difficulty » ci-dessus)
adaptive.scheduler.simple-progress.enabled=true
adaptive.scheduler.simple-progress.cron=0 25 * * * *

# Si Keycloak → app_user pas encore sync : id de secours pour /api/adaptive/me (0 = désactivé)
adaptive.me.dev-fallback-student-id=0

# Anciennes tables MySQL sans created_at / test_date : ALTER idempotent au démarrage
adaptive.schema.mysql-autopatch=true
