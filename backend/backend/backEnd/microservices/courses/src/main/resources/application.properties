spring.application.name=courses
server.port=8086

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888
welcome.message=Welcome to Courses MS (SmartLingua)

# MySQL (XAMPP) - MÊME BASE que le microservice users (smartlingua_users)
spring.datasource.url=jdbc:mysql://localhost:3306/smartlingua_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
#CORS configuration
cors.allowed-origins=http://localhost:4200,http://localhost:8080

management.endpoints.web.exposure.include=refresh,health
