# ========== BASE CENTRALE (PostgreSQL) - toute l'équipe utilise la même base ==========
# Utiliser ce profil quand PostgreSQL est installé et smartlingua_db créé (voir scripts/init-central-db.sql)
spring.datasource.url=jdbc:postgresql://localhost:5432/smartlingua_db?currentSchema=courses
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=courses
